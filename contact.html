<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenden Contact Page</title>
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>

<body class="bg-white text-gray-900">

  <!-- Navbar -->
  <nav class="bg-green-100 p-3 flex items-center justify-between shadow-xl sticky top-0 z-30">
    <h1 class="text-2xl font-bold">Greenden</h1>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
      stroke-width="1.5" stroke="currentColor" class="h-6 w-6 md:hidden">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
    <ul class="gap-5 text-gray-600 hidden md:flex">
    <li><a class="hover:underline hover:text-black" href="index.html">Home</a></li>
    <li><a class="hover:underline hover:text-black" href="products.html">Products</a></li>
    <li><a class="hover:underline hover:text-black" href="contact.html">Contact</a></li>
</ul>
  </nav>

  <!-- Contact Form -->
  <section class="py-10 px-4 mx-auto max-w-screen-md">
    <h2 class="mb-4 text-4xl tracking-tight font-extrabold text-center">Contact Us</h2>
    <p class="mb-8 font-light text-center text-gray-600 text-lg">
      Got a technical issue? Want to send feedback? Need business info? Let us know.
    </p>
    <form action="#" class="space-y-8">
      <div>
        <label for="email" class="block mb-2 text-sm font-medium">Your Email</label>
        <input type="email" id="email" required placeholder="name@example.com"
          class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" />
      </div>
      <div>
        <label for="subject" class="block mb-2 text-sm font-medium">Subject</label>
        <input type="text" id="subject" required placeholder="How can we help you?"
          class="w-full p-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" />
      </div>
      <div>
        <label for="message" class="block mb-2 text-sm font-medium">Your Message</label>
        <textarea id="message" rows="6" required placeholder="Leave a comment..."
          class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500"></textarea>
      </div>
      <button type="submit"
        class="bg-green-600 text-white py-3 px-6 rounded-lg hover:bg-green-700 focus:ring-4 focus:ring-green-300">
        Send Message
      </button>
    </form>
  </section>

  <!-- Footer -->
  <footer class="bg-green-100 p-5 mt-10">
    <h1 class="text-3xl font-bold">Greenden</h1>
    <p class="mt-3">
      The standard chunk of Lorem Ipsum used since the 1500s is reproduced below for those interested.
    </p>
    <p class="mt-3">© 2025 Greenden.com</p>
  </footer>

</body>

</html>
